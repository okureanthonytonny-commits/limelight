version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: limelight_admin
      POSTGRES_PASSWORD: ca67c783dfc74ef9db33794b
      POSTGRES_DB: limelight_mvp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://limelight_admin:ca67c783dfc74ef9db33794b@localhost:5432/limelight_mvp
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend-store:
    build: ./frontend-store
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000

  frontend-admin:
    build: ./frontend-admin
    ports:
      - "5174:5174"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  postgres_data: